services:
  agent-stack-router:
    build: ./router
    image: agent-stack-router:latest
    restart: unless-stopped
    network_mode: host
    environment:
      STACK_DATA_ROOT: ${STACK_DATA_ROOT:-/data}
      USERS_ROOT: ${STACK_DATA_ROOT:-/data}/users
      SEEDS_ROOT: ${STACK_DATA_ROOT:-/data}/seeds
      DB_PATH: ${STACK_DATA_ROOT:-/data}/router.db
      BACKENDS_CONFIG_PATH: ${STACK_DATA_ROOT:-/data}/backends.json
      HOST_STACK_ROOT: ${HOST_STACK_ROOT}

      ROUTER_BIND_HOST: ${ROUTER_BIND_HOST:-127.0.0.1}
      ROUTER_PORT: ${ROUTER_PORT:-18080}
      ROUTER_PUBLIC_BASE_URL: ${ROUTER_PUBLIC_BASE_URL:-}

      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      ALLOW_SIGNUP: ${ALLOW_SIGNUP:-true}
      INVITE_CODE: ${INVITE_CODE:-}

      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME:-Admin}

      DEFAULT_IDLE_SECONDS: ${DEFAULT_IDLE_SECONDS:-600}
      REAPER_INTERVAL_SECONDS: ${REAPER_INTERVAL_SECONDS:-30}

      BACKEND_BIND_HOST: 127.0.0.1
      BACKEND_PORT_START: ${BACKEND_PORT_START:-19000}
      BACKEND_PORT_END: ${BACKEND_PORT_END:-19999}
      BACKEND_STARTUP_TIMEOUT: ${BACKEND_STARTUP_TIMEOUT:-90}

      # NOTE: upstream LLM credentials are NOT injected from process env.
      # Admin sets them in the web UI (Settings -> Backend API keys -> Global)
      # and toggles "share with users" so other users can inherit them.
    volumes:
      # Per-deployment mutable state (users/, router.db). On a fresh install
      # this directory just has to exist; the router populates it.
      - ${HOST_STACK_ROOT}:${STACK_DATA_ROOT:-/data}
      # Ship backends.json + seed templates straight from the git checkout,
      # read-only and overlaid on top of the data dir. This way `git pull`
      # is enough to pick up new backends or updated seed templates -- no
      # manual `cp` step on upgrade.
      - ./backends.json:${STACK_DATA_ROOT:-/data}/backends.json:ro
      - ./seeds:${STACK_DATA_ROOT:-/data}/seeds:ro
      - /var/run/docker.sock:/var/run/docker.sock

  agent-stack-frontend:
    build: ./frontend
    image: agent-stack-frontend:latest
    restart: unless-stopped
    network_mode: host
    depends_on:
      - agent-stack-router
    environment:
      FRONTEND_BIND_HOST: ${FRONTEND_BIND_HOST:-0.0.0.0}
      FRONTEND_PORT: ${FRONTEND_PORT:-18000}
      ROUTER_INTERNAL_URL: http://127.0.0.1:${ROUTER_PORT:-18080}
