# Hermes config for agent-stack: route every model call to the configured
# OpenAI-compatible upstream. ${LLM_BASE_URL} / ${LLM_API_KEY} / ${LLM_MODEL}
# are filled in at seed-render time from per-user overrides set in the web UI
# (Settings -> Backend API keys); never read from process env.

model:
  default: "${LLM_MODEL}"
  provider: "custom"
  base_url: "${LLM_BASE_URL}"

auxiliary:
  vision:
    provider: "custom"
    model: "${LLM_MODEL}"
    base_url: "${LLM_BASE_URL}"
  web_extract:
    provider: "custom"
    model: "${LLM_MODEL}"
    base_url: "${LLM_BASE_URL}"
  compression:
    provider: "custom"
    model: "${LLM_MODEL}"
    base_url: "${LLM_BASE_URL}"
  session_search:
    provider: "custom"
    model: "${LLM_MODEL}"
    base_url: "${LLM_BASE_URL}"
  skills_hub:
    provider: "custom"
    model: "${LLM_MODEL}"
    base_url: "${LLM_BASE_URL}"
  approval:
    provider: "custom"
    model: "${LLM_MODEL}"
    base_url: "${LLM_BASE_URL}"
  mcp:
    provider: "custom"
    model: "${LLM_MODEL}"
    base_url: "${LLM_BASE_URL}"
  flush_memories:
    provider: "custom"
    model: "${LLM_MODEL}"
    base_url: "${LLM_BASE_URL}"
  title_generation:
    provider: "custom"
    model: "${LLM_MODEL}"
    base_url: "${LLM_BASE_URL}"

delegation:
  model: "${LLM_MODEL}"
  provider: "custom"
  base_url: "${LLM_BASE_URL}"
